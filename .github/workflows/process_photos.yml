name: Process new photos

on:
  workflow_dispatch:
    inputs:
      subfolder:
        description: 'Sous-dossier pCloud (ex: 01-Tokyo). Vide = racine.'
        required: false
        default: ''

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow pillow-heif requests

      - name: Process photos (resize + upload pCloud + update photos.json)
        env:
          PCLOUD_TOKEN: ${{ secrets.PCLOUD_TOKEN }}
          PCLOUD_BASE:  ${{ vars.PCLOUD_BASE || 'https://eapi.pcloud.com' }}
          PCLOUD_ROOT:  ${{ vars.PCLOUD_ROOT || '/NIHON' }}
          CDN_BASE:     ${{ vars.CDN_BASE    || 'https://filedn.com/lkWW0YSMhAbFD13RbGDalo0/NIHON' }}
          SUBFOLDER:    ${{ inputs.subfolder }}
        run: python3 code/process_photos_ci.py

      - name: Commit updated photos.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/photos.json
          git diff --staged --quiet \
            || git commit -m "auto: photos.json ← ${{ inputs.subfolder || 'new photos' }}" \
            && git push
